<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIFA World Cup 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0F172A;
      --gold-light: #F5BF3E;
      --gold: #D97706;
      --gold-dark: #A05103;
      --red: #C2261D;
      --gray: #94A3B8;
      --white: #FFFFFF;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--navy);
      font-family: 'Source Sans 3', sans-serif;
    }

    /* ===== Stage & Scaling ===== */
    .stage {
      position: absolute;
      top: 0; left: 0;
      width: 1920px; height: 1080px;
      transform-origin: top left;
      overflow: hidden;
    }

    .hero {
      position: relative;
      width: 1920px; height: 1080px;
      background: var(--navy);
      overflow: hidden;
    }

    /* ===== Background Image ===== */
    .hero-bg {
      position: absolute; inset: 0;
      width: 1920px; height: 1080px;
    }
    .hero-bg img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ===== Gradient Overlay ===== */
    .gradient-overlay {
      position: absolute; inset: 0;
      width: 1920px; height: 1080px;
      background: linear-gradient(to bottom,
        rgba(15,23,42,0.92) 0%,
        rgba(15,23,42,0.65) 50%,
        rgba(15,23,42,0.85) 100%
      );
      z-index: 1;
    }

    /* ===== Ambient Glows ===== */
    .glow-left {
      position: absolute;
      left: -100px; top: 240px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(217,119,6,0.25) 0%, rgba(217,119,6,0) 70%);
      z-index: 1; pointer-events: none;
    }
    .glow-right {
      position: absolute;
      right: -160px; top: 300px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(194,38,29,0.35) 0%, rgba(194,38,29,0) 70%);
      z-index: 1; pointer-events: none;
    }

    /* ===== Diagonal Accent Bands ===== */
    .band-primary {
      position: absolute;
      left: -140px; top: 520px;
      width: 2200px; height: 8px;
      background: linear-gradient(to right,
        rgba(217,119,6,0) 0%,
        rgba(217,119,6,0.8) 30%,
        rgba(245,191,62,1) 50%,
        rgba(217,119,6,0.8) 70%,
        rgba(217,119,6,0) 100%
      );
      transform: rotate(-5deg);
      z-index: 2; pointer-events: none;
    }
    .band-secondary {
      position: absolute;
      left: -140px; top: 534px;
      width: 2200px; height: 3px;
      background: linear-gradient(to right,
        rgba(217,119,6,0) 0%,
        rgba(245,191,62,0.5) 40%,
        rgba(245,191,62,0.5) 60%,
        rgba(217,119,6,0) 100%
      );
      transform: rotate(-5deg);
      z-index: 2; pointer-events: none;
    }

    /* ===== Watermark Year ===== */
    .watermark-year {
      position: absolute;
      left: 50%; top: 260px;
      transform: translateX(-50%);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 320px; font-weight: 400;
      text-align: center; line-height: 1;
      background: linear-gradient(17deg, var(--gold-light) 0%, var(--gold) 60%, var(--gold-dark) 100%);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      opacity: 0.18;
      z-index: 1; pointer-events: none; user-select: none;
    }

    /* ===== Main Content ===== */
    .content {
      position: absolute;
      left: 120px; top: 0;
      width: 1680px; height: 1080px;
      z-index: 5;
      display: flex; flex-direction: column; justify-content: center;
    }
    .main-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 120px; font-weight: 400;
      color: var(--white);
      letter-spacing: 8px; line-height: 1;
      margin-bottom: -10px;
    }
    .year-bold {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 220px; font-weight: 400;
      letter-spacing: 4px; line-height: 1;
      background: linear-gradient(to bottom, var(--gold-light) 0%, var(--gold) 100%);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .accent-line {
      width: 80px; height: 4px;
      background: linear-gradient(to right, var(--gold-light) 0%, rgba(217,119,6,0.4) 100%);
      margin: 48px 0 16px 0;
    }
    .tagline {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 36px; color: var(--gold);
      letter-spacing: 5px; font-weight: 400;
    }
    .host-info {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 56px; color: var(--white);
      letter-spacing: 6px; margin-top: 8px;
    }
    .date-info {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 32px; color: var(--gray);
      letter-spacing: 3px; margin-top: 4px;
    }

    /* ===== Loading / Countdown ===== */
    .countdown-overlay {
      position: absolute;
      left: 120px; bottom: 120px;
      z-index: 10;
      display: flex; align-items: center; gap: 16px;
    }
    .countdown-label {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 20px; color: var(--gray);
      letter-spacing: 4px;
      animation: pulse-text 1s ease-in-out infinite;
    }
    @keyframes pulse-text {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
    .countdown-dots {
      display: flex; gap: 8px;
    }
    .countdown-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--gold);
      opacity: 0.3;
      transition: opacity 0.3s ease;
    }
    .countdown-dot.active {
      opacity: 1;
      box-shadow: 0 0 12px rgba(245,191,62,0.6);
    }

    /* ===== Page Transition ===== */
    .fade-out {
      animation: fadeOut 0.8s ease forwards;
    }
    @keyframes fadeOut {
      0% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.03); }
    }

    /* ===== Entry animation ===== */
    .hero {
      animation: fadeIn 0.6s ease;
    }
    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    /* ===== Nav Bar (simplified for splash) ===== */
    .nav-bar {
      position: absolute;
      top: 0; left: 0;
      width: 1920px; height: 72px;
      background: linear-gradient(to top, rgba(15,23,42,0.9) 0%, rgba(15,23,42,0) 100%);
      z-index: 10;
      display: flex; align-items: center;
      padding: 0 60px;
    }
    .nav-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px; color: var(--gold-light);
      letter-spacing: 4px;
    }

    .stats-strip {
      position: absolute;
      left: 120px; bottom: 26px;
      width: 580px; height: 80px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 2px;
      display: flex; align-items: center; justify-content: space-around;
      z-index: 5; padding: 0 24px;
    }
    .stat-item { display: flex; align-items: baseline; gap: 8px; }
    .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: var(--gold-light); line-height: 1; }
    .stat-label { font-family: 'Source Sans 3', sans-serif; font-size: 14px; color: var(--gray); letter-spacing: 2px; }
    .stat-divider { width: 1px; height: 36px; background: rgba(255,255,255,0.2); }

    /* ===== Skip Button ===== */
    .skip-btn {
      position: absolute;
      right: 60px; top: 24px;
      z-index: 20;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 16px; color: rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px;
      padding: 8px 20px;
      cursor: pointer;
      letter-spacing: 2px;
      transition: all 0.3s ease;
    }
    .skip-btn:hover {
      color: var(--white);
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>

  <button class="skip-btn" onclick="goNow()">跳过 ▸</button>

  <div class="stage" id="stage">
    <div class="hero" id="hero">

      <!-- Background Image -->
      <div class="hero-bg">
        <img src="assets/2_2.png" alt="Stadium atmosphere">
      </div>

      <!-- Gradient Overlay -->
      <div class="gradient-overlay"></div>

      <!-- Ambient Glows -->
      <div class="glow-left"></div>
      <div class="glow-right"></div>

      <!-- Diagonal Accent Bands -->
      <div class="band-primary"></div>
      <div class="band-secondary"></div>

      <!-- Watermark Year -->
      <div class="watermark-year">2026</div>

      <!-- Nav Bar -->
      <nav class="nav-bar">
        <div class="nav-logo">FIFA WC 2026</div>
      </nav>

      <!-- Main Content -->
      <div class="content">
        <h1 class="main-title">FIFA WORLD CUP</h1>
        <div class="year-bold">2026</div>
        <div class="accent-line"></div>
        <p class="tagline">THE GREATEST SHOW ON EARTH RETURNS</p>
        <p class="host-info">USA · CANADA · MEXICO</p>
        <p class="date-info">JUNE 11 — JULY 19, 2026</p>
      </div>

      <!-- Countdown -->
      <div class="countdown-overlay">
        <span class="countdown-label">ENTERING</span>
        <div class="countdown-dots" id="countdownDots">
          <div class="countdown-dot"></div>
          <div class="countdown-dot"></div>
          <div class="countdown-dot"></div>
        </div>
      </div>

      <!-- Stats Strip -->
      <div class="stats-strip">
        <div class="stat-item">
          <span class="stat-num">48</span>
          <span class="stat-label">TEAMS</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-num">104</span>
          <span class="stat-label">MATCHES</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-num">16</span>
          <span class="stat-label">VENUES</span>
        </div>
      </div>

    </div>
  </div>

  <script>
    (function() {
      // --- Stage Scaling ---
      const stage = document.getElementById('stage');
      const DESIGN_W = 1920;
      const DESIGN_H = 1080;

      function resize() {
        const winW = window.innerWidth;
        const winH = window.innerHeight;
        const scale = Math.min(winW / DESIGN_W, winH / DESIGN_H);
        const offsetX = (winW - DESIGN_W * scale) / 2;
        const offsetY = (winH - DESIGN_H * scale) / 2;
        stage.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
      }
      resize();
      window.addEventListener('resize', resize);

      // --- Countdown ---
      const dots = document.querySelectorAll('.countdown-dot');
      const hero = document.getElementById('hero');
      let count = 0;
      const totalSeconds = 3;
      const intervalMs = (totalSeconds * 1000) / totalSeconds;

      function lightUpDot(index) {
        dots.forEach((d, i) => d.classList.toggle('active', i === index));
      }

      lightUpDot(0);

      const ticker = setInterval(() => {
        count++;
        if (count < totalSeconds) {
          lightUpDot(count);
        } else {
          clearInterval(ticker);
          // All dots lit — time to go
          goNow();
        }
      }, intervalMs);

      // --- Go → cover.html ---
      window.goNow = function() {
        clearInterval(ticker);
        hero.classList.add('fade-out');
        setTimeout(() => {
          window.location.href = 'cover.html';
        }, 800);
      };
    })();
  </script>
</body>
</html>
